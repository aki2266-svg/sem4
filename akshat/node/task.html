<!-- write a code to increase font size at interval of 50 milisecond and it should stop increase when the font size reach to 50 px  this task should be performed when you click on increase button on browser default font size 15 px-->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        font='15'
        function fun(font){
            p1.style.fontsize=font +'px'
            p1.style.color='blue'
        }
        function fun1(){
            setInterval(function(){if(font<=50){
                fun(font++)
            }},50)
        }

    </script>
 </head>
 <body>
    <p id="p1">HI</p>
    <button onclick="fun1()">increase</button>
 </body>
 </html>
